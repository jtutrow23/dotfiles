# Minimal, fast prompt with Apple badge on the left

add_newline = false
right_format = "$cmd_duration$time"

# Left layout: 🍎 + directory + git + runtimes
format = """
$os$directory$git_branch$git_status$nodejs$python$rust$golang
$character
"""

# OS badge (enable + style), symbols go in a sub-table
[os]
disabled = false
format = "[$symbol]($style) "
style = "bold fg:bright-red"

[os.symbols]
Macos = "🍎"

# Hide username/hostname noise
[username]
disabled = true
[hostname]
disabled = true

# Directory
[directory]
style = "bold fg:cyan"
format = "[$path]($style)[$read_only]($read_only_style) "
truncation_length = 3
truncation_symbol = ".../"

# Git
[git_branch]
symbol = "🌱 "
style = "bold fg:magenta"
format = "on [$symbol$branch]($style) "

[git_status]
style = "fg:bright-black"
format = "([$all_status$ahead_behind]($style))"

# Prompt char
[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold blue)"

# Runtimes (only show when present)
[nodejs]
symbol = " "
style = "fg:green"
format = "via [$symbol($version)]($style) "

[python]
symbol = " "
style = "fg:yellow"
format = "via [$symbol($version)]($style) "

[rust]
symbol = "🦀 "
style = "fg:bright-red"
format = "via [$symbol($version)]($style) "

[golang]
symbol = " "
style = "fg:cyan"
format = "via [$symbol($version)]($style) "

# Timing on the right
[cmd_duration]
format = " took [$duration](bold yellow) "

[time]
disabled = false
format = " 🕒 [$time]($style) "
style = "fg:bright-black"
time_format = "%I:%M %p"