# ~/.config/lazygit/config.yml

gui:
  nerdFontsVersion: "3" # JetBrainsMono Nerd Font v3 plays nice
  showIcons: true
  showCommandLog: false
  showFileTree: true
  border: "rounded"
  theme:
    activeBorderColor: ["#7e9cd8", "bold"] # Kanagawa "Wave Blue"
    inactiveBorderColor: ["#363646"]
    selectedLineBgColor: ["#2a2a37"] # Subtle selection
    cherryPickedCommitBgColor: ["#2d4f67"]
    cherryPickedCommitFgColor: ["#e6c384"]
    unstagedChangesColor: ["#e46876"] # Red-ish
    defaultFgColor: ["#c8c093"]
git:
  # Internal pager is fine; show colors consistently
  paging:
    colorArg: "always"
    pager: "less -+F -RX"
  # Safer default pushes (you can still force-push from UI)
  autoFetch: true
  skipHookPrefix: "skip-ci"
os:
  editCommand: "nvim" # change to "code -g" if you prefer VS Code
  editCommandTemplate: "{{editor}} {{filename}}:+{{line}}"
  openCommand: "open"
  openLinkCommand: "open {{link}}"
promptToReturnFromSubprocess: false
confirmOnQuit: false
quitOnTopLevelReturn: true
customCommands:
  # Force push current branch (bound in localBranches view)
  - key: "F"
    context: "localBranches"
    description: "Force push current branch"
    command: "git push origin {{.SelectedLocalBranch.Name}} --force"
    loadingText: "Force pushing…"
    output: terminal
  # Nuke workspace: restore tracked changes + delete untracked files (files view)
  - key: "N"
    context: "files"
    description: "Nuke (restore tracked + clean untracked)"
    command: "bash -lc 'git restore . && git clean -fd'"
    loadingText: "Cleaning…"
    output: terminal
  # Fresh: reset local main to origin/main (status view)
  - key: "R"
    context: "status"
    description: "Fresh reset to origin/main"
    command: "bash -lc 'git fetch origin && git reset --hard origin/main'"
    loadingText: "Hard resetting…"
    output: terminal
