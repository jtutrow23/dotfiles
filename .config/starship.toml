add_newline = true
format = """
$os $username$hostname$directory\
$git_branch$git_state$git_status\
$cmd_duration
$character"""

[os]
disabled = false

[username]
show_always = false
format = "[$user]($style) "
style_root = "bold red"
style_user = "bold"

[hostname]
ssh_only = true
format = "on [$hostname]($style) "
style = "dimmed"

[directory]
truncation_length = 3
truncate_to_repo = true
format = "in [$path]($style) "
style = "cyan"

[git_branch]
format = "on [$branch]($style) "
style = "purple"

[git_state]
format = "([$state( $progress_current/$progress_total)]) "
style = "yellow"

# ✅ simplified, valid format — no extra brackets to break parsing
[git_status]
format = "$all_status$ahead_behind "
conflicted = ""
stashed = " "
modified = " "
staged = " "
renamed = " "
deleted = " "
untracked = " "
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕${ahead_count}/${behind_count}"
style = "bold yellow"

[cmd_duration]
min_time = 500
format = "took [$duration]($style)"
style = "dimmed"

[character]
success_symbol = "❯"
error_symbol = "❯"
vicmd_symbol = "❮"